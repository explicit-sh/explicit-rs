name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run wrapper delegate resolution test
        run: cargo test host_tools::tests::preferred_command_path_uses_wrapper_delegate --lib -- --exact

      - name: Run shebang interpreter resolution test
        run: cargo test host_tools::tests::host_command_paths_include_shebang_interpreter --lib -- --exact

      - name: Run npm package-root resolution test
        run: cargo test host_tools::tests::host_command_support_dirs_include_npm_package_root --lib -- --exact

      - name: Run test suite
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

  nix:
    name: Nix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build flake package
        run: nix build .#explicit

      - name: Smoke test packaged binary
        run: ./result/bin/explicit --help

      - name: Check packaged trace library
        run: |
          test -d ./result/lib
          find ./result/lib -maxdepth 1 \( -name 'libexplicit_env_trace.so' -o -name 'libexplicit_env_trace.dylib' \)
